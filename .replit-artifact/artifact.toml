kind = "web"
previewPath = "/"
title = "Academic Service Landing Page"
version = "1.0.0"
id = "artifacts/academic-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20251

[services.development]
run = "pnpm --filter @workspace/academic-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/academic-landing", "run", "build" ]
publicDir = "artifacts/academic-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20251"
BASE_PATH = "/"
